version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: zerograu-postgres
    environment:
      POSTGRES_DB: zerograu
      POSTGRES_USER: zerograu
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zerograu_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zerograu"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zerograu-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zerograu-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/zerograu
      SPRING_DATASOURCE_USERNAME: zerograu
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-zerograu_secret}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-zerograu_jwt_256bit_secret_key_for_hs256_algo_min_length}
      JWT_EXPIRATION: 3600000
      JWT_REFRESH_EXPIRATION: 604800000
      FRONTEND_URL: http://localhost:4200
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zerograu-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
